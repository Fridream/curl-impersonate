name: Auto Sync Upstream Release

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          LOCAL_LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          git tag -l | xargs -r git tag -d

          GITHUB_REPO="lexiforest/curl-impersonate"
          GITHUB_API="https://api.github.com/repos/$GITHUB_REPO/releases/latest"
          LATEST_DATA=$(curl -s -f --retry 10 --retry-all-errors --retry-delay 3 "$GITHUB_API")
          REMOTE_LATEST_TAG=$(echo "$LATEST_DATA" | jq -r '.tag_name')

          if [ "$LOCAL_LATEST_TAG" == "$REMOTE_LATEST_TAG" ]; then echo "е·ІжҳҜжңҖж–°пјҢж— йңҖжӣҙж–°пјҒ";exit 0; fi
          echo "еҸ‘зҺ°ж–°зүҲжң¬$REMOTE_LATEST_TAGпјҢејҖе§Ӣжӣҙж–°пјҒ"

          git remote add upstream "https://github.com/$GITHUB_REPO.git"
          git fetch upstream tag $REMOTE_LATEST_TAG

          cp .github/workflows/upgrade.yml /tmp/upgrade.yml
          git reset --hard $REMOTE_LATEST_TAG
          cp /tmp/upgrade.yml .github/workflows/upgrade.yml
          git add .github/workflows/upgrade.yml
          git commit -m "ж·»еҠ иҮӘеҠЁpythonдҝ®ж”№еҸҳеҹәжӣҙж–°action"

          find .github/workflows -type f ! -name 'upgrade.yml' ! -name 'build.yml' ! -name 'release.yml' -delete
          python3 -c "
          with open('.github/workflows/build.yml','r') as f: content=f.read()
          # 1. д»…workflow_callеҸҜи§ҰеҸ‘action
          position1=content.index('workflow_call:')
          position2=content.index('permissions:')
          position1=content.index('\n',position1)
          position2=content.rindex('\n',0,position2)
          position2=content.rindex('\n',0,position2)
          content=content[:position1]+content[position2:]
          # 2. д»…зј–иҜ‘еҸ‘еёғx86_64-linux-gnu
          position1=content.index('matrix:')
          position1=content.index('- ',position1)
          position1=content.index('- ',position1+2)
          position2=content.index('steps:')
          position1=content.rindex('\n',0,position1)
          position2=content.rindex('\n',0,position2)
          content=content[:position1]+content[position2:]
          # 3. дҝ®ж”№дёәйқһйқҷжҖҒзј–иҜ‘
          position1=content.index('Run configure script')
          position1=content.index('Linux',position1)
          position1=content.index('--enable-static --disable-shared',position1)
          position2=position1+33
          content=content[:position1]+content[position2:]
          # 4. еҲ йҷӨios-xcframework
          position1=content.index('ios-xcframework:')
          position1=content.rindex('\n',0,position1)
          content=content[:position1]
          with open('.github/workflows/build.yml','w') as f: f.write(content)
          with open('.github/workflows/release.yml','r') as f: content=f.read()
          # 5. еҲ йҷӨbuild-windows
          position1=content.index('build-windows:')
          position2=content.index('publish-release:')
          position1=content.rindex('\n',0,position1)
          position2=content.rindex('\n',0,position2)
          content=content[:position1]+content[position2:]
          # 6. еҲ йҷӨbuild-windows needs
          position1=content.index('publish-release:')
          position1=content.index('needs:',position1)
          position1=content.index('- build-windows',position1)
          position2=content.index('\n',position1)
          position1=content.rindex('\n',0,position1)
          content=content[:position1]+content[position2:]
          with open('.github/workflows/release.yml','w') as f: f.write(content)
          "
          git add -u
          git commit -m "дҝ®ж”№build.ymlдёәйқһйқҷжҖҒжһ„е»әпјҢдё”еҸӘжһ„е»әеҸ‘еёғlinux x86_64 gnuпјҢеҲ йҷӨrelease.ymlдёӯbuild-windowsе’ҢеӨҡдҪҷзҡ„jobsе’Ңaction"

          git push -f origin main
          git tag -l | xargs -r git tag -d
          git tag $REMOTE_LATEST_TAG
          git push origin $REMOTE_LATEST_TAG